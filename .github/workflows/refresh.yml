name: Refresh adoptable pets

on:
  schedule:
    - cron: '0 11 * * *' # daily ~07:00 ET
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Scrape adoptable pets
        env:
          DOG_TALES_FEED_ONLY: '1'
          DOG_TALES_FEED_JSON: adoptable-pets.json
        run: python scrape.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- adoptable-pets.json; then
            echo "No changes to the feed."
          else
            git config user.name "dog-tales-bot"
            git config user.email "actions@users.noreply.github.com"
            git add adoptable-pets.json
            git commit -m "Refresh adoptable pets ($(date -u +%Y-%m-%d))"
            git push
          fi
